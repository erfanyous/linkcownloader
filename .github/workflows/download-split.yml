- name: Smart download with retry and resume
  run: |
    URL="${{ inputs.url }}"
    OUTPUT_FILE="${{ steps.filename.outputs.name }}"
    USER_AGENT="Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/120.0.0.0 Safari/537.36"
    REFERER="https://libgen.is/"
    COOKIE_JAR="cookies.txt"
    MAX_RETRIES=5
    RETRY_DELAY=10

    # تابع دانلود با curl و resume
    download_with_curl() {
      local url=$1
      local output=$2
      curl -L --http1.1 \
           --retry $MAX_RETRIES \
           --retry-delay $RETRY_DELAY \
           --retry-all-errors \
           --continue-at - \
           -A "$USER_AGENT" \
           -e "$REFERER" \
           -b "$COOKIE_JAR" \
           -c "$COOKIE_JAR" \
           -o "$output" \
           "$url"
      return $?
    }

    # مرحله 1: دریافت صفحه HTML یا ریدایرکت
    curl -L --http1.1 --retry 3 \
         -A "$USER_AGENT" \
         -e "$REFERER" \
         -c "$COOKIE_JAR" \
         -b "$COOKIE_JAR" \
         -o "temp_download" \
         "$URL"

    # بررسی نوع محتوا
    if file "temp_download" | grep -q "HTML"; then
      echo "HTML page detected. Extracting real download link..."
      
      # استخراج لینک واقعی (همان منطق قبلی)
      REAL_URL=$(grep -oP 'href="\K[^"]+\.(pdf|epub|djvu|mobi|azw3)[^"]*' temp_download | head -1)
      if [ -z "$REAL_URL" ]; then
        REAL_URL=$(grep -oP "window\.location\.href\s*=\s*'\K[^']+" temp_download | head -1)
      fi
      if [ -z "$REAL_URL" ]; then
        REAL_URL=$(grep -oP "http-equiv=\"refresh\" content=\"[0-9]+;url='\K[^']+" temp_download | head -1)
      fi
      if [ -z "$REAL_URL" ]; then
        MD5_FROM_URL=$(echo "$URL" | grep -oP 'md5=\K[^&]+')
        [ -n "$MD5_FROM_URL" ] && REAL_URL=$(grep -oP "href=\"[^\"]*${MD5_FROM_URL}[^\"]*" temp_download | head -1 | sed 's/href="//')
      fi
      
      if [ -n "$REAL_URL" ]; then
        if [[ "$REAL_URL" == //* ]]; then
          REAL_URL="https:$REAL_URL"
        elif [[ "$REAL_URL" == /* ]]; then
          REAL_URL="https://libgen.is$REAL_URL"
        elif [[ "$REAL_URL" != http* ]]; then
          REAL_URL="https://libgen.is/$REAL_URL"
        fi
        echo "Real file URL: $REAL_URL"
        
        # دانلود فایل واقعی با قابلیت resume
        echo "Starting download with resume support..."
        download_with_curl "$REAL_URL" "$OUTPUT_FILE"
        CURL_EXIT=$?
      else
        echo "ERROR: Could not find download link."
        exit 1
      fi
    else
      # مستقیم فایل بود
      mv temp_download "$OUTPUT_FILE"
      CURL_EXIT=0
    fi

    # بررسی مجدد خطای 18 و تلاش با wget در صورت نیاز
    if [ $CURL_EXIT -eq 18 ]; then
      echo "curl exited with code 18 (partial file). Trying wget as fallback..."
      # استخراج مجدد لینک واقعی اگر لازم بود (در متغیر REAL_URL ذخیره شده)
      if [ -n "$REAL_URL" ]; then
        wget --tries=5 --timeout=60 --continue -O "$OUTPUT_FILE" "$REAL_URL"
        WGET_EXIT=$?
        if [ $WGET_EXIT -ne 0 ]; then
          echo "wget also failed with exit code $WGET_EXIT"
          exit $WGET_EXIT
        fi
      else
        echo "No REAL_URL to retry with wget"
        exit 18
      fi
    elif [ $CURL_EXIT -ne 0 ]; then
      echo "curl failed with exit code $CURL_EXIT"
      exit $CURL_EXIT
    fi

    # بررسی حجم فایل دانلود شده (اختیاری)
    if [ -f "$OUTPUT_FILE" ]; then
      SIZE=$(stat -c%s "$OUTPUT_FILE")
      echo "Downloaded file size: $SIZE bytes"
      if [ $SIZE -eq 0 ]; then
        echo "Error: Downloaded file is empty."
        exit 1
      fi
    else
      echo "Error: Output file not created."
      exit 1
    fi

    echo "Download completed successfully."
