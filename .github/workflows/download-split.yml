name: Download and Split Large File (Libgen compatible - final)

on:
  workflow_dispatch:
    inputs:
      url:
        description: 'لینک فایل (حتی لینک‌های لیبجن)'
        required: true
      filename:
        description: 'نام فایل (اختیاری)'
        required: false
        default: ''
      target_dir:
        description: 'دایرکتوری مقصد'
        required: false
        default: 'downloads'

permissions:
  contents: write

jobs:
  download-and-split:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Install dependencies
        run: sudo apt-get update && sudo apt-get install -y coreutils curl file wget

      - name: Prepare target directory
        run: mkdir -p "${{ inputs.target_dir }}"

      - name: Determine filename
        id: filename
        run: |
          if [ -n "${{ inputs.filename }}" ]; then
            echo "name=${{ inputs.filename }}" >> $GITHUB_OUTPUT
          else
            URL="${{ inputs.url }}"
            if [[ "$URL" == *"md5="* ]]; then
              MD5=$(echo "$URL" | grep -oP 'md5=\K[^&]+')
              echo "name=${MD5}.pdf" >> $GITHUB_OUTPUT
            else
              FILE_NAME=$(basename "$URL" | sed 's/\?.*//')
              [ -z "$FILE_NAME" ] && FILE_NAME="downloaded_file"
              echo "name=$FILE_NAME" >> $GITHUB_OUTPUT
            fi
          fi

      - name: Smart download (handles libgen)
        run: |
          URL="${{ inputs.url }}"
          OUTPUT_FILE="${{ steps.filename.outputs.name }}"
          USER_AGENT="Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/120.0.0.0 Safari/537.36"
          REFERER="https://libgen.is/"
          COOKIE_JAR="cookies.txt"
          MAX_TRIES=5
          MIN_SIZE=5000
          
          get_real_url() {
            curl -L --http1.1 --retry 3 \
                 -A "$USER_AGENT" -e "$REFERER" \
                 -c "$COOKIE_JAR" -b "$COOKIE_JAR" \
                 -o "temp_page" "$1"
            if file "temp_page" | grep -q "HTML"; then
              REAL=$(grep -oP 'href="\K[^"]+\.(pdf|epub|djvu|mobi|azw3)[^"]*' temp_page | head -1)
              [ -z "$REAL" ] && REAL=$(grep -oP "window\.location\.href\s*=\s*'\K[^']+" temp_page | head -1)
              [ -z "$REAL" ] && REAL=$(grep -oP "http-equiv=\"refresh\" content=\"[0-9]+;url='\K[^']+" temp_page | head -1)
              if [ -z "$REAL" ]; then
                MD5_FROM_URL=$(echo "$1" | grep -oP 'md5=\K[^&]+')
                [ -n "$MD5_FROM_URL" ] && REAL=$(grep -oP "href=\"[^\"]*${MD5_FROM_URL}[^\"]*" temp_page | head -1 | sed 's/href="//')
              fi
              if [ -n "$REAL" ]; then
                [[ "$REAL" == //* ]] && REAL="https:$REAL"
                [[ "$REAL" == /* ]] && REAL="https://libgen.is$REAL"
                [[ "$REAL" != http* ]] && REAL="https://libgen.is/$REAL"
                echo "$REAL"
              else
                echo ""
              fi
            else
              echo "$1"
            fi
          }
          
          REAL_URL=$(get_real_url "$URL")
          if [ -z "$REAL_URL" ]; then
            echo "ERROR: Could not extract download link"
            cat temp_page
            exit 1
          fi
          echo "Real URL: $REAL_URL"
          
          for try in $(seq 1 $MAX_TRIES); do
            echo "Download attempt $try of $MAX_TRIES"
            rm -f "$OUTPUT_FILE"
            
            wget --tries=3 --timeout=30 --retry-connrefused \
                 --header="User-Agent: $USER_AGENT" \
                 --header="Referer: $REFERER" \
                 --load-cookies="$COOKIE_JAR" \
                 --no-check-certificate \
                 -O "$OUTPUT_FILE" \
                 "$REAL_URL" 2> wget_log.txt
            
            if [ -f "$OUTPUT_FILE" ]; then
              SIZE=$(stat -c%s "$OUTPUT_FILE")
              if [ "$SIZE" -ge "$MIN_SIZE" ]; then
                echo "Download successful. Size: $SIZE bytes"
                break
              else
                echo "Downloaded file too small ($SIZE bytes). Retrying..."
                cat "$OUTPUT_FILE"
              fi
            else
              echo "wget failed, trying curl..."
              curl -L --http1.1 --retry 5 --retry-delay 3 \
                   -A "$USER_AGENT" -e "$REFERER" -b "$COOKIE_JAR" \
                   -o "$OUTPUT_FILE" \
                   "$REAL_URL"
              if [ -f "$OUTPUT_FILE" ]; then
                SIZE=$(stat -c%s "$OUTPUT_FILE")
                if [ "$SIZE" -ge "$MIN_SIZE" ]; then
                  echo "curl succeeded. Size: $SIZE bytes"
                  break
                fi
              fi
            fi
            
            echo "Refreshing download link..."
            REAL_URL=$(get_real_url "$URL")
            if [ -z "$REAL_URL" ]; then
              echo "Failed to get new link"
              exit 1
            fi
            echo "New Real URL: $REAL_URL"
          done
          
          if [ ! -f "$OUTPUT_FILE" ]; then
            echo "All download attempts failed."
            exit 1
          fi
          FINAL_SIZE=$(stat -c%s "$OUTPUT_FILE")
          if [ "$FINAL_SIZE" -lt "$MIN_SIZE" ]; then
            echo "Final file too small ($FINAL_SIZE bytes). Aborting."
            exit 1
          fi
          echo "Download completed successfully. File: $OUTPUT_FILE ($FINAL_SIZE bytes)"

      - name: Get file size and split if needed
        id: filesize
        run: |
          SIZE=$(stat -c%s "${{ steps.filename.outputs.name }}")
          echo "size=$SIZE" >> $GITHUB_OUTPUT
          MAX_SIZE=104857600
          if [ $SIZE -gt $MAX_SIZE ]; then
            echo "needs_split=true" >> $GITHUB_OUTPUT
          else
            echo "needs_split=false" >> $GITHUB_OUTPUT
          fi

      - name: Move small file to target directory
        if: steps.filesize.outputs.needs_split == 'false'
        run: |
          mv "${{ steps.filename.outputs.name }}" "${{ inputs.target_dir }}/"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add "${{ inputs.target_dir }}/${{ steps.filename.outputs.name }}"
          git commit -m "Add downloaded file: ${{ steps.filename.outputs.name }}"
          git push

      - name: Split large file into parts (95MB each)
        if: steps.filesize.outputs.needs_split == 'true'
        run: |
          ORIGINAL="${{ steps.filename.outputs.name }}"
          TARGET_DIR="${{ inputs.target_dir }}/${ORIGINAL}_parts"
          mkdir -p "$TARGET_DIR"
          split -b 95M -d -a 3 "$ORIGINAL" "$TARGET_DIR/part_"
          cat > "$TARGET_DIR/manifest.txt" << EOF
          original_filename=$ORIGINAL
          part_count=$(ls "$TARGET_DIR"/part_* | wc -l)
          part_prefix=part_
          EOF
          cat > "$TARGET_DIR/reassemble.sh" << 'EOF'
          #!/bin/bash
          source manifest.txt
          cat ${part_prefix}* > "../$original_filename"
          echo "Reassembled file: ../$original_filename"
          EOF
          chmod +x "$TARGET_DIR/reassemble.sh"
          rm "$ORIGINAL"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add "$TARGET_DIR"
          git commit -m "Split large file $ORIGINAL into parts"
          git push
          echo "✅ File split into parts."
          echo "🔧 To reassemble: cd $TARGET_DIR && ./reassemble.sh"

      - name: Completion message
        run: echo "🎉 Action completed."
